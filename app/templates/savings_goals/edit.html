{% extends "base.html" %}
{% block title %}Edit Savings Goal - FinSafe{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-md mb-lg">
        <a href="{{ url_for('savings_goals.index') }}" class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-[24px] font-bold text-primary">Edit Savings Goal</h1>
    </div>

    <div class="soft-card p-lg rounded-xl">
        <form method="POST" class="space-y-md">
            <div>
                <label for="name" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Goal Name</label>
                <input type="text" id="name" name="name" value="{{ goal.name }}" required
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
            </div>
            <div>
                <label for="target_amount" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Target Amount (£)</label>
                <input type="number" step="0.01" id="target_amount" name="target_amount" value="{{ goal.target_amount }}" required
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
            </div>
            <div>
                <label for="current_amount" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Current Amount (£)</label>
                <input type="number" step="0.01" id="current_amount" name="current_amount" value="{{ goal.current_amount }}" required
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
            </div>
            <div>
                <label for="target_date" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Target Date (optional)</label>
                <input type="date" id="target_date" name="target_date"
                       value="{{ goal.target_date.strftime('%Y-%m-%d') if goal.target_date else '' }}"
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
            </div>
            <div class="flex gap-sm pt-sm">
                <button type="submit"
                        class="flex-1 py-md bg-primary text-on-primary text-[14px] font-semibold rounded-lg active:scale-95 transition-transform">
                    Update Goal
                </button>
                <a href="{{ url_for('savings_goals.index') }}"
                   class="flex-1 py-md bg-surface-container text-on-surface text-[14px] font-medium rounded-lg hover:bg-surface-container-high transition-colors text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
