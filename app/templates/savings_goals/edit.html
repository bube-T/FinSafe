{% extends "base.html" %}

{% block title %}Edit Savings Goal - FinSafe{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Savings Goal</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Goal Name</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ goal.name }}" required>
            </div>
            <div class="mb-3">
                <label for="target_amount" class="form-label">Target Amount</label>
                <input type="number" step="0.01" class="form-control" id="target_amount" name="target_amount" value="{{ goal.target_amount }}" required>
            </div>
            <div class="mb-3">
                <label for="current_amount" class="form-label">Current Amount</label>
                <input type="number" step="0.01" class="form-control" id="current_amount" name="current_amount" value="{{ goal.current_amount }}" required>
            </div>
            <div class="mb-3">
                <label for="target_date" class="form-label">Target Date (Optional)</label>
                <input type="date" class="form-control" id="target_date" name="target_date" 
                       value="{{ goal.target_date.strftime('%Y-%m-%d') if goal.target_date else '' }}">
            </div>
            <button type="submit" class="btn btn-primary">Update Savings Goal</button>
            <a href="{{ url_for('savings_goals.index') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
