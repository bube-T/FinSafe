{% extends "base.html" %}

{% block title %}Edit Budget - FinSafe{% endblock %}

{% block content %}
<h1 class="mb-4">Edit Budget</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="amount" class="form-label">Budget Amount</label>
                <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ budget.amount }}" required>
            </div>
            <div class="mb-3">
                <label for="period" class="form-label">Period</label>
                <select class="form-select" id="period" name="period" required>
                    <option value="weekly" {% if budget.period == 'weekly' %}selected{% endif %}>Weekly</option>
                    <option value="monthly" {% if budget.period == 'monthly' %}selected{% endif %}>Monthly</option>
                    <option value="yearly" {% if budget.period == 'yearly' %}selected{% endif %}>Yearly</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="category_id" class="form-label">Category (Optional - leave blank for all categories)</label>
                <select class="form-select" id="category_id" name="category_id">
                    <option value="">All Categories</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if budget.category_id == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label for="alert_threshold" class="form-label">Alert Threshold (%)</label>
                <input type="number" step="0.1" class="form-control" id="alert_threshold" name="alert_threshold" value="{{ budget.alert_threshold }}" min="0" max="100" required>
                <small class="form-text text-muted">You'll receive an alert when spending reaches this percentage of your budget.</small>
            </div>
            <button type="submit" class="btn btn-primary">Update Budget</button>
            <a href="{{ url_for('budgets.index') }}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
