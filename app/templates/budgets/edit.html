{% extends "base.html" %}
{% block title %}Edit Budget - FinSafe{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="flex items-center gap-md mb-lg">
        <a href="{{ url_for('budgets.index') }}" class="p-2 rounded-lg text-on-surface-variant hover:bg-surface-container transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-[24px] font-bold text-primary">Edit Budget</h1>
    </div>

    <div class="soft-card p-lg rounded-xl">
        <form method="POST" class="space-y-md">
            <div>
                <label for="amount" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Budget Amount (£)</label>
                <input type="number" step="0.01" id="amount" name="amount" value="{{ budget.amount }}" required
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
            </div>
            <div>
                <label for="period" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Period</label>
                <select id="period" name="period" required
                        class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
                    <option value="weekly" {% if budget.period == 'weekly' %}selected{% endif %}>Weekly</option>
                    <option value="monthly" {% if budget.period == 'monthly' %}selected{% endif %}>Monthly</option>
                    <option value="yearly" {% if budget.period == 'yearly' %}selected{% endif %}>Yearly</option>
                </select>
            </div>
            <div>
                <label for="category_id" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Category (optional)</label>
                <select id="category_id" name="category_id"
                        class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
                    <option value="">All Categories</option>
                    {% for category in categories %}
                    <option value="{{ category.id }}" {% if budget.category_id == category.id %}selected{% endif %}>
                        {{ category.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="alert_threshold" class="block text-[11px] font-bold text-on-surface-variant uppercase tracking-widest mb-xs">Alert Threshold (%)</label>
                <input type="number" step="0.1" id="alert_threshold" name="alert_threshold" value="{{ budget.alert_threshold }}" min="0" max="100" required
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-[14px] text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary">
                <p class="text-[12px] text-on-surface-variant mt-xs">You'll get an alert when spending reaches this % of your budget</p>
            </div>
            <div class="flex gap-sm pt-sm">
                <button type="submit"
                        class="flex-1 py-md bg-primary text-on-primary text-[14px] font-semibold rounded-lg active:scale-95 transition-transform">
                    Update Budget
                </button>
                <a href="{{ url_for('budgets.index') }}"
                   class="flex-1 py-md bg-surface-container text-on-surface text-[14px] font-medium rounded-lg hover:bg-surface-container-high transition-colors text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
