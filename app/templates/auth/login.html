{% extends "base.html" %}
{% block title %}Login - FinSafe{% endblock %}

{% block content %}
<div class="w-full max-w-sm">
    <!-- Logo -->
    <div class="flex flex-col items-center mb-xl">
        <div class="w-14 h-14 bg-primary rounded-2xl flex items-center justify-center mb-md shadow-lg">
            <span class="material-symbols-outlined text-on-primary" style="font-size:28px">security</span>
        </div>
        <h1 class="text-headline-md font-bold text-primary">FinSafe</h1>
        <p class="text-body-sm text-on-surface-variant mt-xs">Sign in to your account</p>
    </div>

    <div class="soft-card p-lg rounded-xl">
        <form method="POST" class="space-y-md">
            <div>
                <label for="username" class="block text-label-sm text-on-surface-variant uppercase tracking-wider mb-xs">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-body-md text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary">
            </div>
            <div>
                <label for="password" class="block text-label-sm text-on-surface-variant uppercase tracking-wider mb-xs">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full border border-outline-variant rounded-lg px-md py-sm text-body-md text-on-surface bg-surface-container-lowest focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary">
            </div>
            <button type="submit"
                    class="w-full py-md bg-primary text-on-primary text-label-md font-semibold rounded-lg active:scale-95 transition-transform shadow-sm mt-lg">
                Sign In
            </button>
        </form>
    </div>

    <p class="text-center text-body-sm text-on-surface-variant mt-lg">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-secondary font-semibold hover:underline">Register here</a>
    </p>
</div>
{% endblock %}
